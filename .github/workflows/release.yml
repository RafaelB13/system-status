name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Package
        run: npm run dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Release File Info
        id: info
        run: |
          VERSION=$(echo ${{ github.ref_name }} | sed 's/^v//')
          
          # Encontrar o primeiro .dmg na pasta release/
          # Usando find para ser resiliente a nomes com espaços ou sufixos
          FILEPATH=$(find release -maxdepth 1 -name "*.dmg" -print -quit)
          
          if [ -z "$FILEPATH" ]; then
            echo "Error: No .dmg file found in release/ folder."
            ls -R release/
            exit 1
          fi
          
          FILENAME=$(basename "$FILEPATH")
          SHA256=$(shasum -a 256 "$FILEPATH" | awk '{print $1}')
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT
          echo "filepath=${FILEPATH}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA256}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.info.outputs.filepath }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        run: |
          CASK_FILE="Homebrew/Casks/system-status.rb"
          VERSION="${{ steps.info.outputs.version }}"
          SHA256="${{ steps.info.outputs.sha256 }}"
          
          # Atualiza a versão no arquivo ruby
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$CASK_FILE"
          
          # Atualiza o sha256 (funciona se for :no_check ou um hash anterior)
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" "$CASK_FILE"
          sed -i '' "s/sha256 :no_check/sha256 \"${SHA256}\"/" "$CASK_FILE"
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          
          # Tenta commitar e dar push se houver alterações
          git commit -m "chore(release): update homebrew cask to v${VERSION}" && git push origin HEAD:${{ github.event.repository.default_branch }} || echo "No changes to commit"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
